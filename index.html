<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Your Fortune · Light Patches</title>
<meta name="description" content="Peel to reveal your Light Patches fortune.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#FAEFEC; --blush-deep:#F3DEDB;
    --coral:#E89A9E; --coral-deep:#D97D83; --coral-light:#F2BFC1;
    --oxblood:#801D23; --ink:#5A1A1F;
    --paper:#FBF7F2; --paper-edge:#EFE6DC;
    --sleeve-w:min(62vw, 248px);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #FFF6F3 0%, var(--blush) 55%, var(--blush-deep) 130%);
    color:var(--ink); font-family:"Nunito Sans",system-ui,sans-serif;
    min-height:100svh; display:flex; flex-direction:column; align-items:center;
    justify-content:space-between; padding:max(16px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));
    overflow:hidden; text-align:center;
  }
  .mast{display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:4px;}
  .logo{width:62px;height:auto;display:block;}
  .wordmark{font-family:"Playfair Display",serif;font-weight:600;color:var(--oxblood);
    font-size:21px;letter-spacing:.2px;line-height:1;}
  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.32em;text-transform:uppercase;color:var(--coral-deep);}

  .stage-3d{perspective:1000px;perspective-origin:50% 42%;flex:0 1 auto;display:flex;}
  .stage{position:relative;width:var(--sleeve-w);aspect-ratio:45 / 85;max-height:54svh;
    border-radius:18px;overflow:hidden;will-change:transform;
    box-shadow:0 22px 45px -20px rgba(128,29,35,.5);}
  .layer{position:absolute;inset:0;}

  .card{background:linear-gradient(180deg,#FFFDFB,var(--paper) 30%,var(--paper) 70%,#F6EFE6);
    border:1px solid var(--paper-edge);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px 22px;}
  .card-rule{width:26px;height:1px;background:var(--coral);opacity:.6;}
  .fortune{font-family:"Playfair Display",serif;font-style:italic;font-weight:500;color:var(--oxblood);
    font-size:clamp(16px,4.6vw,20px);line-height:1.5;margin:0;}
  .flavor{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--coral-deep);margin:0;}

  .foilBack{background:linear-gradient(125deg,#B85059 0%,#D97D83 30%,#F3CFD1 50%,#E08A8F 66%,#A8454D 100%);
    filter:drop-shadow(-7px 9px 9px rgba(128,29,35,.42));clip-path:polygon(0 0,0 0,0 0);}
  .foilBack::after{content:"";position:absolute;inset:0;
    background:linear-gradient(125deg,transparent 44%,rgba(255,255,255,.5) 50%,transparent 56%);mix-blend-mode:screen;}

  .foilFront{background:linear-gradient(135deg,#F4B5B8 0%,var(--coral) 22%,#E08A8F 40%,var(--coral) 58%,#F2B9BC 72%,var(--coral-deep) 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;color:#fff;
    clip-path:polygon(0 0,100% 0,100% 100%,0 100%);}
  .spec{position:absolute;inset:-25%;background:linear-gradient(115deg,transparent 41%,rgba(255,255,255,.42) 50%,transparent 59%);
    mix-blend-mode:screen;pointer-events:none;}
  .foil-mark{font-family:"Playfair Display",serif;font-weight:600;font-size:15px;line-height:1.15;
    text-shadow:0 1px 2px rgba(128,29,35,.35);}
  .foil-sub{font-size:9px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.85);}
  .foil-hint{position:absolute;bottom:16px;left:0;right:0;font-size:10px;font-weight:700;
    letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.9);
    display:flex;align-items:center;justify-content:center;gap:6px;animation:breathe 2.4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.55;}50%{opacity:1;}}

  .peelSurface{position:absolute;inset:0;cursor:grab;touch-action:none;z-index:5;}
  .peelSurface:active{cursor:grabbing;}
  .peelSurface:focus-visible{outline:3px solid var(--oxblood);outline-offset:3px;border-radius:18px;}

  .below{display:flex;flex-direction:column;align-items:center;gap:14px;
    min-height:128px;justify-content:flex-start;width:100%;max-width:340px;}
  .instruct{font-size:14px;color:var(--ink);opacity:.8;margin:0;font-weight:400;transition:opacity .35s var(--ease);}
  .controls{display:none;flex-direction:column;align-items:center;gap:12px;}
  .controls.show{display:flex;}
  .btn{font-family:"Nunito Sans",sans-serif;font-size:13px;font-weight:700;letter-spacing:.02em;
    border-radius:999px;padding:11px 24px;cursor:pointer;border:1.5px solid var(--oxblood);
    background:var(--oxblood);color:#fff;transition:transform .1s,opacity .2s;}
  .btn:active{transform:scale(.96);}
  .btn:focus-visible{outline:3px solid var(--coral-deep);outline-offset:2px;}
  .sharelink{font-family:"Nunito Sans",sans-serif;font-size:12.5px;font-weight:700;letter-spacing:.03em;
    color:var(--oxblood);background:none;border:none;cursor:pointer;padding:2px 0;
    display:inline-flex;align-items:center;gap:6px;border-bottom:1px solid var(--coral);}
  .sharelink:active{transform:scale(.97);}
  .sharelink:focus-visible{outline:2px solid var(--coral-deep);outline-offset:3px;}

  .waitlist{display:none;flex-direction:column;align-items:center;gap:9px;width:100%;
    opacity:0;transition:opacity .5s var(--ease);}
  .waitlist.show{display:flex;opacity:1;}
  .waitlist-label{font-size:11.5px;color:var(--coral-deep);font-weight:700;letter-spacing:.04em;}
  .wl-row{display:flex;gap:7px;width:100%;max-width:300px;}
  .wl-input{flex:1;border:1.5px solid var(--blush-deep);background:#fff;border-radius:999px;
    padding:10px 16px;font-family:inherit;font-size:13px;color:var(--ink);min-width:0;}
  .wl-input::placeholder{color:#C8A9A6;}
  .wl-input:focus{outline:none;border-color:var(--coral);}
  .wl-go{border:none;background:var(--coral);color:#fff;border-radius:999px;padding:10px 16px;
    font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
  .wl-go:active{transform:scale(.96);}
  .wl-note{font-size:11px;color:var(--ink);opacity:.6;margin:0;}

  .foot{display:flex;flex-direction:column;align-items:center;gap:3px;padding-bottom:2px;}
  .foot a{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--oxblood);
    text-decoration:none;border-bottom:1px solid var(--coral);padding-bottom:1px;}
  .foot small{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--coral-deep);opacity:.75;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--oxblood);color:#fff;font-size:12.5px;font-weight:600;padding:10px 18px;
    border-radius:999px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-height:680px){:root{--sleeve-w:min(52vw,200px);}.below{min-height:112px;}}
</style>
</head>

<script>
/* ============================================================
   LIGHT PATCHES - FORTUNE PAGE  (single self-contained file)

const SHOP_URL = "https://lightpatches.com"; // TODO
const FORTUNE_URL = (location.origin && location.origin!=='null')
  ? location.origin + location.pathname : SHOP_URL;

const FORTUNES = ["A fresh start is always closer than you think, sometimes it's right on the tip of your tongue.", "Say the bold thing today. You've got nothing to hide and nothing on your breath.", "Good things come to those who savour. Then refresh.", "The luckiest people leave every room a little brighter, and every conversation a little fresher.", "One more bite, one more reason to smile.", "Confidence is the best thing you'll wear all day. Wear it close.", "Today belongs to the ones who lean in. Go on, get a little closer.", "A clear mind starts with a clean slate. And a clean slate starts small.", "The best conversations happen when you forget to be nervous.", "Luck favours the prepared, and the well-mannered.", "Somewhere today, a stranger will be glad you smiled first.", "Small rituals make big days. Keep yours.", "You are exactly one good moment away from a better afternoon.", "The sweetest endings leave you ready for one more.", "Be the reason someone leans in instead of leaning away.", "Freshness is a quiet kind of confidence. You've got plenty.", "Today, take up a little more space. You've earned the room.", "The people who shine never announce it. They just show up clear.", "A good day is mostly good moments, stacked. Start stacking.", "Whatever you're nervous to say, say it close, say it sure.", "Kindness travels fast. So does a good first impression.", "The bravest thing you can do today is be fully present.", "Trust the version of you that just finished a great meal, clean and certain.", "Your next yes is hiding behind one deep breath. Take it.", "Life rewards the ones who keep showing up fresh.", "Lean into the day like you mean it.", "A little sweetness now, a clear head after. That's the whole secret.", "The room always remembers who made them feel at ease.", "Good fortune is just good habits, wearing a disguise.", "Today, say less and mean more. Then smile.", "The best accessory you own can't be bought, only refreshed.", "Somewhere ahead of you, a great conversation is waiting. Don't keep it waiting.", "Begin again as often as you need. Beginnings are free.", "You don't have to be ready. You just have to be close enough to start.", "The world makes room for people who arrive clear and certain.", "A fresh mouth, a fresh mind, a fresh chance, in that order.", "Let today be the one where you finally lean all the way in.", "The smallest reset can change a whole afternoon.", "Be good to your gut, and the rest tends to follow.", "After every ending there's a cleaner, brighter beginning."];
const FLAVORS  = ["Strawberry Peppermint", "Cool Mint", "Wild Strawberry", "Garden Mint", "Pink Peppercorn", "Bright Citrus", "Crushed Mint", "Sun Strawberry", "Rosewater", "Cold-Brew Mint", "Berry Frost", "Fresh Linen Mint"];

const stage=document.getElementById('stage');
const front=document.getElementById('foilFront');
const back=document.getElementById('foilBack');
const surf=document.getElementById('peelSurface');
const spec=document.getElementById('spec');
const fortuneEl=document.getElementById('fortune');
const flavorEl=document.getElementById('flavor');
const instruct=document.getElementById('instruct');
const controls=document.getElementById('controls');
const waitlist=document.getElementById('waitlist');
const toastEl=document.getElementById('toast');
const wrap=document.querySelector('.stage-3d');
document.getElementById('shoplink').href=SHOP_URL;
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;

let lastF=-1,lastV=-1,currentText="";
function pick(arr,last){let i;do{i=Math.floor(Math.random()*arr.length);}while(arr.length>1&&i===last);return i;}
function loadFortune(){
  lastF=pick(FORTUNES,lastF); lastV=pick(FLAVORS,lastV);
  currentText=FORTUNES[lastF];
  fortuneEl.textContent=currentText;
  flavorEl.textContent="Lucky flavour, "+FLAVORS[lastV];
}

/* ---------- peel geometry ---------- */
let W=0,H=0,b=1,t=0.06,revealed=false;
const REST=0.06;
function measure(){W=stage.offsetWidth;H=stage.offsetHeight;b=W/H;}
function sOf(x,y){return (1 - x/W + y/H)/2;}
function clipRect(inside,inter){
  const poly=[{x:0,y:0},{x:W,y:0},{x:W,y:H},{x:0,y:H}],out=[];
  for(let i=0;i<4;i++){const c=poly[i],n=poly[(i+1)%4],ci=inside(c),ni=inside(n);
    if(ci)out.push(c); if(ci!==ni)out.push(inter(c,n));}
  return out;
}
function toClip(p){return p.length<3?'polygon(0 0,0 0,0 0)':'polygon('+p.map(q=>q.x.toFixed(1)+'px '+q.y.toFixed(1)+'px').join(',')+')';}
function render(){
  const a=W*(1-2*t), f=p=>p.x-b*p.y-a;
  const inter=(p,q)=>{const fp=f(p),fq=f(q),u=fp/(fp-fq);return{x:p.x+u*(q.x-p.x),y:p.y+u*(q.y-p.y)};};
  front.style.clipPath=toClip(clipRect(p=>f(p)<=1e-3,inter));
  const peeled=clipRect(p=>f(p)>=-1e-3,inter);
  const k=2/(1+b*b);
  back.style.clipPath=toClip(peeled.map(p=>{const ff=f(p);return{x:p.x-k*ff,y:p.y+k*ff*b};}));
}
function localXY(e){const r=stage.getBoundingClientRect();
  return [ (e.clientX-r.left)/r.width*W, (e.clientY-r.top)/r.height*H ];}
function tweenTo(target,dur,done){
  if(reduce){t=target;render();done&&done();return;}
  const s=t,d0=performance.now();
  (function step(now){let p=Math.min(1,(now-d0)/dur);const e=1-Math.pow(1-p,3);
    t=s+(target-s)*e;render();
    if(p<1)requestAnimationFrame(step);else{t=target;render();done&&done();}})(performance.now());
}

/* ---------- drag to peel ---------- */
let dragging=false,t0=0,s0=0;
surf.addEventListener('pointerdown',e=>{
  if(revealed)return; measure(); enableGyro();
  const [lx,ly]=localXY(e);
  dragging=true;t0=t;s0=sOf(lx,ly);
  surf.setPointerCapture(e.pointerId);
});
surf.addEventListener('pointermove',e=>{
  if(!dragging)return;
  const [lx,ly]=localXY(e);
  t=Math.max(0,Math.min(1,t0+(sOf(lx,ly)-s0)));render();
});
function endDrag(){if(!dragging)return;dragging=false; t>0.45?commit():tweenTo(REST,380);}
surf.addEventListener('pointerup',endDrag);
surf.addEventListener('pointercancel',endDrag);
surf.addEventListener('keydown',e=>{
  if((e.key==='Enter'||e.key===' ')&&!revealed){e.preventDefault();measure();commit();}
});
function commit(){
  revealed=true;
  tweenTo(1,440,()=>{
    surf.style.pointerEvents='none';
    instruct.style.opacity='0';
    setTimeout(()=>{instruct.style.display='none';
      controls.classList.add('show');waitlist.classList.add('show');},170);
  });
}

/* ---------- 3D tilt (no shake) ---------- */
let tiltX=0,tiltY=0,curTX=0,curTY=0,idle=0;
function tiltLoop(){
  idle+=0.010;
  curTX+=(tiltX-curTX)*0.07; curTY+=(tiltY-curTY)*0.07;
  const ix=Math.sin(idle)*1.4, iy=Math.cos(idle*0.8)*1.8;
  const rx=curTX+ix, ry=curTY+iy;
  stage.style.transform='rotateX('+rx.toFixed(2)+'deg) rotateY('+ry.toFixed(2)+'deg)';
  spec.style.transform='translateX('+(ry*3).toFixed(1)+'px) translateY('+(-rx*2).toFixed(1)+'px)';
  requestAnimationFrame(tiltLoop);
}
wrap.addEventListener('pointermove',e=>{
  if(dragging)return;
  const r=wrap.getBoundingClientRect();
  const px=(e.clientX-r.left)/r.width-0.5, py=(e.clientY-r.top)/r.height-0.5;
  tiltY=px*13; tiltX=-py*11;
});
wrap.addEventListener('pointerleave',()=>{tiltX=0;tiltY=0;});

/* gyroscope tilt on phones */
let gyroOn=false,baseB=null,baseG=null;
function onGyro(e){
  if(e.gamma==null)return;
  if(baseG==null){baseG=e.gamma;baseB=e.beta;}
  tiltY=Math.max(-13,Math.min(13,(e.gamma-baseG)*0.6));
  tiltX=Math.max(-11,Math.min(11,-(e.beta-baseB)*0.5));
}
function enableGyro(){
  if(gyroOn||reduce)return;
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted'){window.addEventListener('deviceorientation',onGyro);gyroOn=true;}}).catch(()=>{});
  } else if(window.DeviceOrientationEvent){
    window.addEventListener('deviceorientation',onGyro);gyroOn=true;
  }
}

/* ---------- peel another ---------- */
document.getElementById('again').addEventListener('click',()=>{
  controls.classList.remove('show'); loadFortune(); revealed=false;
  surf.style.pointerEvents='auto'; instruct.style.display='block';
  requestAnimationFrame(()=>instruct.style.opacity='.8');
  measure(); tweenTo(REST,540);
});

/* ---------- share your fortune cookie ---------- */
document.getElementById('share').addEventListener('click',async()=>{
  const text='🥠 "'+currentText+'", my Light Patches fortune. Peel your own:';
  if(navigator.share){
    try{await navigator.share({title:'Light Patches fortune',text,url:FORTUNE_URL});}catch(_){}
  } else {
    try{await navigator.clipboard.writeText(text+' '+FORTUNE_URL);toast('Link copied, forward away');}
    catch(_){toast('Could not copy, try again');}
  }
});

/* ---------- waitlist ---------- */
document.getElementById('wlgo').addEventListener('click',joinWaitlist);
document.getElementById('email').addEventListener('keydown',e=>{if(e.key==='Enter')joinWaitlist();});
function joinWaitlist(){
  const input=document.getElementById('email'),note=document.getElementById('wlnote'),val=input.value.trim();
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)){note.textContent="Hmm, that email doesn't look right.";input.focus();return;}
  // TODO (Klaviyo): POST `val` to your Klaviyo list endpoint here.
  document.querySelector('.wl-row').style.display='none';
  document.querySelector('.waitlist-label').textContent="You're on the list ✨";
  note.textContent="We'll be in touch before launch.";
}

/* ---------- toast ---------- */
let toastTimer;
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2400);}

/* ---------- init ---------- */
function init(){loadFortune();measure();render(); if(!reduce)requestAnimationFrame(tiltLoop);}
window.addEventListener('resize',()=>{if(!dragging){measure();render();}});
if(document.readyState!=='loading')init(); else document.addEventListener('DOMContentLoaded',init);
window.addEventListener('load',()=>{measure();render();});
</script>
